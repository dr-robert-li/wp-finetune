data:
  train_file: data/reasoning_dataset/openai_train.jsonl
  val_file: data/reasoning_dataset/openai_val.jsonl
  test_file: data/reasoning_dataset/openai_val.jsonl
eval:
  gen_dimension_targets:
    D2_security: 0.95
    D3_sql: 0.9
  judge_dimension_targets:
    D2_security: 0.75
    D3_sql: 0.75
  overall_mean_target: 75.0
  overall_spearman_target: 0.8
  phpcs_pass_target: 0.95
  security_pass_target: 0.98
  spearman_target: 0.85
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.0
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_up_proj
  - down_proj
  target_parameters:
  - mlp.experts.gate_up_proj
  - mlp.experts.down_proj
  # modules_to_save intentionally omitted (RTRN Pitfall 4):
  # embeddings already trained into the merged base; re-tuning on a tiny set
  # risks drifting the working <wp_gen>/<wp_judge> special tokens.
model:
  local_dir: ./models/qwen3-30b-wp-30_70-merged
  max_seq_length: 8192
  name: Qwen/Qwen3-30B-A3B
tokenizer:
  save_dir: ./adapters/tokenizer
  special_tokens:
  - <wp_gen>
  - <wp_judge>
training:
  bf16: true
  dataloader_num_workers: 3
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 3
  eval_steps: 50
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  learning_rate: 2.0e-5
  logging_steps: 5
  lr_scheduler_type: cosine
  num_train_epochs: 2
  output_dir: ./adapters/qwen3-30b-wp-30_70-reasoning
  per_device_train_batch_size: 1
  save_steps: 50
  warmup_steps: 20
