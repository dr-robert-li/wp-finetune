model:
  name: "Qwen/Qwen3-30B-A3B"
  local_dir: "./models/Qwen3-30B-A3B"
  max_seq_length: 4096

tokenizer:
  special_tokens: ["<wp_gen>", "<wp_judge>"]
  save_dir: "./adapters/tokenizer"

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_up_proj", "down_proj"]
  modules_to_save: ["embed_tokens", "lm_head"]

training:
  num_train_epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  dataloader_num_workers: 4
  dataloader_persistent_workers: true
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  bf16: true
  logging_steps: 10
  eval_steps: 100
  save_steps: 200
  output_dir: "./adapters/qwen3-wp"

data:
  train_file: "data/final_dataset/openai_train.jsonl"
  val_file: "data/final_dataset/openai_val.jsonl"
  test_file: "data/final_dataset/openai_test.jsonl"

eval:
  # Overall targets
  overall_mean_target: 75.0
  overall_spearman_target: 0.80
  # Per-dimension gen pass rates (score >= 8/10)
  gen_dimension_targets:
    D2_security: 0.95
    D3_sql: 0.90
  # Per-dimension judge correlations
  judge_dimension_targets:
    D2_security: 0.75
    D3_sql: 0.75
  # Legacy (backward compat)
  phpcs_pass_target: 0.95
  spearman_target: 0.85
  security_pass_target: 0.98
