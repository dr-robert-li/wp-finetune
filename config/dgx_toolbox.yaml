# DGX Toolbox Configuration
#
# Points to the dgx-toolbox project directory. All DGX Toolbox scripts
# are resolved relative to this path. Change this if your dgx-toolbox
# is in a different location.
#
# Can also be overridden via DGX_TOOLBOX_PATH environment variable.

dgx_toolbox_path: ~/dgx-toolbox

# Component paths (relative to dgx_toolbox_path)
components:
  # Training
  unsloth_studio: containers/unsloth-studio.sh
  ngc_pytorch: containers/ngc-pytorch.sh

  # Inference
  vllm: inference/start-vllm.sh
  litellm: inference/start-litellm.sh
  ollama_setup: inference/setup-ollama-remote.sh
  open_webui: inference/start-open-webui.sh

  # Evaluation
  eval_toolbox: eval/eval-toolbox.sh
  eval_jupyter: eval/eval-toolbox-jupyter.sh
  triton: eval/triton-trtllm.sh

  # Data
  data_toolbox: data/data-toolbox.sh
  label_studio: data/start-label-studio.sh
  argilla: data/start-argilla.sh

  # Utilities
  status: status.sh
  modelstore: modelstore.sh
  build_toolboxes: build-toolboxes.sh
  litellm_config: inference/setup-litellm-config.sh

# Shared directories (used by DGX Toolbox containers)
shared_dirs:
  huggingface_cache: ~/.cache/huggingface
  unsloth_data: ~/unsloth-data
  eval_datasets: ~/eval/datasets
  eval_models: ~/eval/models
  eval_runs: ~/eval/runs
  data_exports: ~/data/exports

# Extra bind mounts (used via EXTRA_MOUNTS env var in dgx-toolbox lib.sh)
# Format: comma-separated host:container pairs
# Set automatically by run-training skill, or manually:
#   export EXTRA_MOUNTS="/path/to/wp-finetune:/workspace/wp-finetune"
extra_mounts:
  wp_finetune: "{project_root}:/workspace/wp-finetune"

# Container working directory for exec commands
container_workdir: /workspace/wp-finetune

# Pinned dependency versions (must match inside container)
pinned_versions:
  transformers: "4.56.2"
  trl: "0.24.0"
  datasets: "4.3.0"
  bitsandbytes: "0.48.0"
  huggingface_hub: "0.34.1"

# Ports
ports:
  unsloth_studio: 8000
  vllm: 8020
  litellm: 4000
  open_webui: 12000
  ollama: 11434
  label_studio: 8081
  argilla: 6900
  triton_http: 8010
  triton_grpc: 8011
